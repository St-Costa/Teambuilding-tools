name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annulla esecuzioni precedenti sullo stesso ref quando arriva un nuovo push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, type-check, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Controllo formattazione
        run: npm run format:check

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build frontend
        run: npm run build

  rust:
    name: Backend Rust (fmt, clippy, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dipendenze di sistema (WebKitGTK + ALSA per Tauri/rodio)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libssl-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Formattazione Rust
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Build Rust
        working-directory: src-tauri
        run: cargo build --locked
